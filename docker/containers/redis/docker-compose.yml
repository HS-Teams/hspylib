services:
  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: unless-stopped

    ports:
      - "6379:6379"

    command: >
      redis-server
      --requirepass password
      --save 20 1
      --loglevel warning

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a password ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

    volumes:
      - ./data/redis:/data

    networks:
      - esnet

networks:
  esnet:
